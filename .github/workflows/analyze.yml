name: AI Gallery Analysis Worker

on:
  workflow_dispatch:
    inputs:
      gallery_url:
        description: 'URL of the DC Inside Gallery'
        required: true
      uuid:
        description: 'UUID for tracking the report'
        required: true
      requested_at:
        description: 'ISO timestamp when the analysis was requested (from frontend)'
        required: false
        default: ''

jobs:
  analyze_and_save:
    # DC Inside는 GitHub Actions(Azure) IP를 차단합니다.
    # 해결책 A: self-hosted runner 사용 → 아래 값을 [self-hosted] 로 변경
    # 해결책 B: SCRAPER_PROXY GitHub Secret 설정 (예: socks5://user:pass@host:port)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          cd python_scripts
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and AI Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          # DC Inside 접근 차단 시 프록시 설정 (선택 사항)
          # GitHub Secret "SCRAPER_PROXY" 에 socks5://user:pass@host:port 형식으로 설정
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: |
          cd python_scripts
          python main_worker.py "${{ github.event.inputs.gallery_url }}" "${{ github.event.inputs.uuid }}"

      - name: Save Results to Google Sheets
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd python_scripts
          python save_to_sheets.py "${{ github.event.inputs.uuid }}" "${{ github.event.inputs.requested_at }}"
